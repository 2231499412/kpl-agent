services:
  backend:
    build: .
    container_name: kpl-agent-backend
    mem_limit: 256m
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      JAVA_OPTS: "-Xms128m -Xmx200m"
      SERVER_PORT: 9090
      MYSQL_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-kpl_agent}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://token-plan-cn.xiaomimimo.com/v1}
      AI_MODEL: ${AI_MODEL:-mimo-v2.5}
      KPL_SYNC_ENABLED: ${KPL_SYNC_ENABLED:-false}
      KPL_CORS_ALLOWED_ORIGINS: ${KPL_CORS_ALLOWED_ORIGINS:-*}
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: kpl-agent-frontend
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-9091}:80"
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: kpl-agent-mysql
    mem_limit: 384m
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-kpl_agent}
    ports:
      - "${MYSQL_PORT:-13307}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --innodb-buffer-pool-size=64M
      - --key-buffer-size=16M
      - --max-connections=50
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-data.sql:/docker-entrypoint-initdb.d/init-data.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7.2
    container_name: kpl-agent-redis
    mem_limit: 64m
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --maxmemory 50mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
