services:
  backend:
    build: .
    container_name: kpl-agent-backend
    mem_limit: 256m
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      JAVA_OPTS: "-Xms128m -Xmx200m"
      SERVER_PORT: 9090
      MYSQL_URL: jdbc:mysql://host.docker.internal:3306/${MYSQL_DATABASE:-kpl_agent}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      MYSQL_USERNAME: ${MYSQL_USERNAME:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://token-plan-cn.xiaomimimo.com/v1}
      AI_MODEL: ${AI_MODEL:-mimo-v2.5}
      KPL_SYNC_ENABLED: ${KPL_SYNC_ENABLED:-false}
      KPL_CORS_ALLOWED_ORIGINS: ${KPL_CORS_ALLOWED_ORIGINS:-*}
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: kpl-agent-frontend
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-9091}:80"
    restart: unless-stopped

  redis:
    image: redis:7.2
    container_name: kpl-agent-redis
    mem_limit: 64m
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --maxmemory 50mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  redis-data:
