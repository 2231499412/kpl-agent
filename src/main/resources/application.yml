server:
  port: ${SERVER_PORT:9090}

spring:
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:13307/kpl_agent?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# KPL API 配置
kpl:
  api:
    comp-base-url: https://prod.comp.smoba.qq.com
    tga-base-url: https://tga-openapi.tga.qq.com
    connect-timeout: 5000
    read-timeout: 10000
  sync:
    enabled: ${KPL_SYNC_ENABLED:false}
    latest-cron: "${KPL_SYNC_LATEST_CRON:0 0/30 * * * ?}"
    deep-cron: "${KPL_SYNC_DEEP_CRON:0 10 3 * * ?}"
  cors:
    allowed-origins: ${KPL_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:15173,http://localhost:3000}

# AI 配置 (MiMo - OpenAI 兼容协议)
ai:
  api-key: ${AI_API_KEY:your-api-key-here}
  base-url: ${AI_BASE_URL:https://token-plan-cn.xiaomimimo.com/v1}
  model: ${AI_MODEL:mimo-v2.5}
  web-search:
    enabled: ${AI_WEB_SEARCH_ENABLED:true}
    max-results: ${AI_WEB_SEARCH_MAX_RESULTS:5}
    timeout-millis: ${AI_WEB_SEARCH_TIMEOUT_MILLIS:2500}
    query-prefix: ${AI_WEB_SEARCH_QUERY_PREFIX:KPL 王者荣耀职业联赛}

logging:
  level:
    com.kpl.agent: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  health:
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
